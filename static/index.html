<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Street &#8470;1 Collector</title>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <!-- App CSS -->
    <link rel="stylesheet" href="/css/base.css" />
    <link rel="stylesheet" href="/css/sidebar.css" />
    <link rel="stylesheet" href="/css/map.css" />
    <link rel="stylesheet" href="/css/gallery.css" />
    <link rel="stylesheet" href="/css/responsive.css" />
</head>
<body>
    <div class="header">
        <h1>Street &#8470;1 Collector</h1>
        <div style="display: flex; align-items: center; gap: 10px;">
            <button class="btn-gallery" id="galleryToggle">Gallery</button>
            <div class="count" id="streetCount">0 streets</div>
        </div>
    </div>

    <button class="toggle-sidebar" id="toggleSidebar">&#9776; Menu</button>

    <div class="gallery-view" id="galleryView" style="display: none;">
        <div class="gallery-content" id="galleryContent"></div>
    </div>

    <div class="container" id="mapContainer">
        <div class="sidebar" id="sidebar">
            <div class="upload-section">
                <div class="upload-zone" id="uploadZone">
                    <p>&#128248; Click or drag a photo here</p>
                </div>
                <input type="file" id="fileInput" accept="image/*" style="display: none;">
                <img id="imagePreview" alt="Preview">

                <div class="location-actions" id="locationActions">
                    <button class="btn-locate" id="locateBtn">Use My Location</button>
                </div>

                <div class="notice" id="clickMapNotice">
                    &#128205; Click on the map to set the location
                </div>

                <div class="search-street-group" id="searchStreetGroup">
                    <label>Find Street No. 1</label>
                    <div class="search-input-wrapper">
                        <input type="text" id="streetSearchInput" placeholder="Type street name...">
                        <button class="btn-search" id="searchButton">Search</button>
                    </div>
                    <div class="search-results" id="searchResults"></div>
                </div>

                <div class="form-group" id="streetNameGroup">
                    <label for="streetNameInput">Street Name</label>
                    <input type="text" id="streetNameInput" placeholder="Loading...">
                </div>

                <div class="form-group" id="saveButtonGroup">
                    <button class="btn btn-primary" id="saveButton" disabled>Save Entry</button>
                </div>
            </div>

            <div class="list-section">
                <input type="text" class="filter-input" id="filterInput" placeholder="&#128269; Search streets...">
                <ul class="street-list" id="streetList"></ul>
                <div class="empty-state" id="emptyState">No streets collected yet. Start by uploading a photo!</div>
            </div>
        </div>

        <div id="map"></div>
        <button class="btn-my-location" id="myLocationBtn" title="Show my location">&#9678;</button>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- EXIF Reader -->
    <script src="https://unpkg.com/exifr@7.1.3/dist/lite.umd.js"></script>

    <!-- App JS (load order matters) -->
    <script src="/js/state.js?v=2"></script>
    <script src="/js/map-init.js?v=2"></script>
    <script src="/js/app.js?v=2"></script>
    <script src="/js/markers.js?v=2"></script>
    <script src="/js/upload.js?v=2"></script>
    <script src="/js/geocoding.js?v=2"></script>
    <script src="/js/streets.js?v=2"></script>
    <script src="/js/gallery.js?v=2"></script>
    <script>init();</script>
</body>
</html>
